name: Daily Event Update

on:
  schedule:
    - cron: "0 18 * * *"   # 2pm Eastern (UTC-4 in summer)
  workflow_dispatch:         # lets you trigger it manually from GitHub

permissions:
  contents: write            # push updated files back to repo
  pages: write               # deploy to GitHub Pages
  id-token: write            # required for Pages OIDC auth

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events_all_*.txt events_tomorrow_*.json docs/index.html
          git diff --cached --quiet || git commit -m "chore: daily event update $(date -u +'%Y-%m-%d')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
